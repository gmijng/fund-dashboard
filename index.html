<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>基金看盘面板</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #1a1a2e;
    --card: #16213e;
    --card2: #0f3460;
    --text: #e0e0e0;
    --text-dim: #8899aa;
    --up: #ef5350;
    --down: #26a69a;
    --accent: #4fc3f7;
    --border: #2a3a5a;
    --warn: #ffb74d;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
    min-height: 100vh;
    padding: 16px;
  }

  .overview {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
    margin-bottom: 16px;
  }

  .ov-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    text-align: center;
  }

  .ov-label { font-size: 12px; color: var(--text-dim); margin-bottom: 6px; }
  .ov-value { font-size: 20px; font-weight: 600; }
  .ov-value.up { color: var(--up); }
  .ov-value.down { color: var(--down); }
  .ov-value.neutral { color: var(--text); }

  .indices {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 16px;
    padding: 10px 12px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
  }

  .idx-tag {
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 4px;
    background: var(--card2);
  }

  .idx-tag.up { color: var(--up); }
  .idx-tag.down { color: var(--down); }

  .toolbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
    flex-wrap: wrap;
    gap: 8px;
  }

  .toolbar-left { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .toolbar-right { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

  .search-box {
    position: relative;
  }

  .search-box input {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    padding: 8px 12px 8px 32px;
    font-size: 13px;
    outline: none;
    width: 160px;
  }

  .search-box input:focus { border-color: var(--accent); }

  .search-box::before {
    content: '🔍';
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 12px;
  }

  input, select {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    padding: 8px 12px;
    font-size: 13px;
    outline: none;
  }

  input:focus, select:focus { border-color: var(--accent); }

  .btn {
    background: var(--card2);
    border: 1px solid var(--accent);
    color: var(--accent);
    border-radius: 6px;
    padding: 8px 14px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .btn:hover { background: var(--accent); color: var(--bg); }
  .btn-danger { border-color: var(--warn); color: var(--warn); }
  .btn-danger:hover { background: var(--warn); color: var(--bg); }

  .view-toggle { display: flex; gap: 4px; }
  .view-toggle .btn { padding: 8px 10px; font-size: 12px; }
  .view-toggle .btn.active { background: var(--accent); color: var(--bg); }

  .table-wrap { overflow-x: auto; }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 15px;
    table-layout: fixed;
  }

  th {
    background: var(--card2);
    color: var(--text-dim);
    padding: 10px 6px;
    text-align: right;
    font-weight: 400;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    cursor: pointer;
    user-select: none;
  }

  th:hover { color: var(--accent); }
  th.sorted-asc::after { content: ' ↑'; }
  th.sorted-desc::after { content: ' ↓'; }

  th:first-child { text-align: left; width: 18%; }
  th:nth-child(2) { width: 10%; }
  th:nth-child(3) { width: 12%; }
  th:nth-child(4) { width: 12%; }
  th:nth-child(5) { width: 11%; }
  th:nth-child(6) { width: 9%; }
  th:nth-child(7) { width: 10%; }
  th:nth-child(8) { width: 10%; }
  th:nth-child(9) { width: 10%; }
  th:last-child { width: 6%; }

  /* 简洁模式隐藏的列 */
  th.simple-hide, td.simple-hide { display: none; }

  @media (max-width: 900px) {
    th:nth-child(3), td:nth-child(3),
    th:nth-child(4), td:nth-child(4),
    th:nth-child(7), td:nth-child(7) { display: none; }
  }

  td {
    padding: 10px 6px;
    text-align: right;
    border-bottom: 1px solid #1f2a40;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  td:first-child { text-align: left; width: 18%; }
  td:nth-child(2) { text-align: center; color: var(--text-dim); font-size: 13px; }
  td:nth-child(3) { font-size: 14px; }
  td:nth-child(4) { font-size: 14px; }
  td:nth-child(5) { font-size: 14px; }
  td:nth-child(6) { font-size: 14px; }
  td:nth-child(7) { font-size: 14px; }
  td:nth-child(8) { font-size: 14px; }
  td:nth-child(9) { font-size: 14px; }

  tr:hover { background: #1f2a40; }
  tr.suspicious { background: rgba(255, 183, 77, 0.1); }
  tr.high-profit { background: rgba(239, 83, 80, 0.15); }
  tr.high-loss { background: rgba(38, 166, 154, 0.15); }

  .up { color: var(--up); }
  .down { color: var(--down); }
  .neutral { color: var(--text-dim); }

  .del-btn {
    background: transparent;
    border: none;
    color: var(--warn);
    cursor: pointer;
    font-size: 16px;
    padding: 0 4px;
  }

  .edit-input {
    background: var(--card);
    border: 1px solid var(--accent);
    color: var(--text);
    border-radius: 4px;
    padding: 6px 8px;
    font-size: 15px;
    width: 100px;
    text-align: right;
  }

  .modal-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.7);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
  }

  .modal-overlay.hidden { display: none; }

  .modal {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    width: 340px;
    max-width: 90vw;
  }

  .modal h3 { margin-bottom: 16px; color: var(--accent); }
  .modal-row { display: flex; gap: 8px; margin-bottom: 10px; }
  .modal-row input { flex: 1; }
  .modal-row label { color: var(--text-dim); font-size: 12px; align-self: center; width: 70px; }
  .modal-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
  .modal-info { font-size: 11px; color: var(--text-dim); margin-top: 8px; }

  .status-bar {
    font-size: 11px;
    color: var(--text-dim);
    text-align: right;
    margin-top: 10px;
    padding: 0 4px;
  }

  .status-bar.error { color: var(--warn); }

  .compare-bar {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-bottom: 12px;
    padding: 10px 12px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    flex-wrap: wrap;
  }

  .compare-bar.hidden { display: none; }

  .compare-bar span { font-size: 13px; color: var(--text-dim); }
  .compare-fund { background: var(--card2); padding: 4px 10px; border-radius: 4px; font-size: 12px; }
  .compare-fund .remove { color: var(--warn); cursor: pointer; margin-left: 6px; }

  @media (max-width: 600px) {
    .overview { grid-template-columns: repeat(2, 1fr); }
    table { font-size: 13px; }
    th, td { padding: 10px 4px; }
    .edit-input { width: 80px; font-size: 14px; padding: 5px 6px; }
    .toolbar { flex-direction: column; align-items: flex-start; }
    .toolbar-left, .toolbar-right { width: 100%; }
    .search-box input { width: 120px; }
  }
</style>
</head>
<body>

<div class="overview" id="overview">
  <div class="ov-card">
    <div class="ov-label">总资产</div>
    <div class="ov-value neutral" id="ov-asset">—</div>
  </div>
  <div class="ov-card">
    <div class="ov-label">今日收益</div>
    <div class="ov-value" id="ov-today">—</div>
  </div>
  <div class="ov-card">
    <div class="ov-label">累计收益</div>
    <div class="ov-value" id="ov-total">—</div>
  </div>
  <div class="ov-card">
    <div class="ov-label">持仓基金数</div>
    <div class="ov-value neutral" id="ov-count">—</div>
  </div>
</div>

<div class="indices" id="indices">
  <span class="idx-tag" id="idx-sh">上证: —</span>
  <span class="idx-tag" id="idx-sz">深证: —</span>
  <span class="idx-tag" id="idx-cy">创业板: —</span>
  <span class="idx-tag" id="idx-kc">科创50: —</span>
  <span class="idx-tag" id="idx-hk">恒生: —</span>
  <span class="idx-tag" id="idx-hktech">恒生科技: —</span>
</div>

<div class="compare-bar hidden" id="compare-bar">
  <span>对比：</span>
  <div id="compare-funds"></div>
  <button class="btn" id="btn-compare">对比涨跌</button>
  <button class="btn btn-danger" id="btn-clear-compare">清空</button>
</div>

<div class="toolbar">
  <div class="toolbar-left">
    <div class="search-box">
      <input type="text" id="search-input" placeholder="搜索基金名称/代码">
    </div>
    <button class="btn" id="btn-add">+ 添加基金</button>
    <button class="btn" id="btn-import">📥 导入</button>
    <button class="btn btn-danger" id="btn-clear">清空数据</button>
  </div>
  <div class="toolbar-right">
    <div class="view-toggle">
      <button class="btn active" id="btn-simple" title="简洁模式">简</button>
      <button class="btn" id="btn-detail" title="详细模式">详</button>
    </div>
    <button class="btn" id="btn-export">📤 导出</button>
    <select id="sort-by">
      <option value="value">按持有金额</option>
      <option value="today">按今日涨跌</option>
      <option value="total">按累计收益率</option>
    </select>
    <button class="btn" id="btn-refresh">刷新数据</button>
  </div>
</div>

<div class="table-wrap">
  <table id="fund-table">
    <thead>
      <tr>
        <th data-sort="name">基金名称</th>
        <th data-sort="code">代码</th>
        <th data-sort="amount" class="simple-hide">持有金额</th>
        <th data-sort="gain" class="simple-hide">持有收益</th>
        <th data-sort="gsz">今日估值</th>
        <th data-sort="gszzl">今日涨跌</th>
        <th data-sort="cost" class="simple-hide">持仓成本</th>
        <th data-sort="todayGain">今日收益</th>
        <th data-sort="totalPct">累计收益率</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="fund-tbody"></tbody>
  </table>
</div>

<div class="status-bar" id="status-bar">首次加载中…</div>

<div class="modal-overlay hidden" id="modal-add">
  <div class="modal">
    <h3>添加基金</h3>
    <div class="modal-row">
      <input type="text" id="modal-code" placeholder="基金代码，如 017811" maxlength="6">
    </div>
    <div class="modal-row">
      <input type="number" id="modal-amount" placeholder="持有金额（元），即当前市值" step="0.01">
    </div>
    <div class="modal-row">
      <input type="number" id="modal-gain" placeholder="持有收益（元），即累计收益（可填负数）" step="0.01">
    </div>
    <div class="modal-row">
      <div id="modal-preview" style="font-size:12px;color:#8899aa;margin-top:4px;"></div>
    </div>
    <div class="modal-btns">
      <button class="btn" id="modal-cancel">取消</button>
      <button class="btn" id="modal-confirm">确认添加</button>
    </div>
  </div>
</div>

<div class="modal-overlay hidden" id="modal-compare">
  <div class="modal">
    <h3>基金对比</h3>
    <div id="compare-result" style="margin-top:10px;"></div>
    <div class="modal-btns">
      <button class="btn" id="modal-compare-close">关闭</button>
    </div>
  </div>
</div>

<script>
const CODETABS_PROXY = 'https://api.codetabs.com/v1/proxy';

let funds = [];
let marketData = {};
let indexData = {};
let isRefreshing = false;
let currentView = 'simple';
let currentSort = { key: 'value', asc: false };
let searchKeyword = '';
let compareFunds = [];

function saveFunds() {
  localStorage.setItem('fund-dashboard-funds', JSON.stringify(funds));
}

function loadFunds() {
  const s = localStorage.getItem('fund-dashboard-funds');
  if (s) funds = JSON.parse(s);
}

async function fetchFundGJ(code) {
  const key = code.replace(/[^0-9]/g, '');
  if (!key) return null;
  try {
    const resp = await fetch(`${CODETABS_PROXY}/?quest=${encodeURIComponent('https://fundgz.1234567.com.cn/js/' + key + '.js')}`);
    if (!resp.ok) return null;
    const text = await resp.text();
    const match = text.match(/jsonpgz\((.+?)\)/);
    if (!match) return null;
    const d = JSON.parse(match[1]);
    return { name: d.name, gsz: parseFloat(d.gsz), gszzl: parseFloat(d.gszzl), dwjz: parseFloat(d.dwjz), gztime: d.gztime };
  } catch(e) {
    return null;
  }
}

const INDEX_MAP = {
  'sh000001': { el: 'idx-sh', name: '上证', tencentCode: 'sh000001' },
  'sz399001': { el: 'idx-sz', name: '深证', tencentCode: 'sz399001' },
  'sz399006': { el: 'idx-cy', name: '创业板', tencentCode: 'sz399006' },
  'sh000688': { el: 'idx-kc', name: '科创50', tencentCode: 'sh000688' },
  'hkHSI':    { el: 'idx-hk', name: '恒生', tencentCode: 'hkHSI' },
  'hkHSTECH': { el: 'idx-hktech', name: '恒生科技', tencentCode: 'hkHSTECH' }
};

async function fetchIndex() {
  try {
    const codes = Object.values(INDEX_MAP).map(v => v.tencentCode).join(',');
    const resp = await fetch(`https://qt.gtimg.cn/q=${codes}`);
    if (!resp.ok) return;
    const text = await resp.text();

    const lines = text.split('\n');
    for (const line of lines) {
      const m = line.match(/v_(\w+)="([^"]+)"/);
      if (!m) continue;
      const code = m[1];
      const parts = m[2].split('~');
      if (parts.length < 33) continue;

      let foundEntry = null;
      for (const entry of Object.entries(INDEX_MAP)) {
        const [idxCode, info] = entry;
        if (info.tencentCode === code) { foundEntry = idxCode; break; }
      }
      if (!foundEntry) continue;

      const curr = parseFloat(parts[3]);
      const pct = parseFloat(parts[32] || '0');

      indexData[foundEntry] = {
        name: INDEX_MAP[foundEntry].name,
        price: curr.toFixed(2),
        pct: pct
      };
    }
  } catch(e) {
    console.warn('fetch index error', e);
  }
}

function getFundDisplayData(f) {
  const md = marketData[f.code] || {};
  const gsz = md.gsz || f.cost;
  const dwjz = md.dwjz || f.cost;
  const amount = f.amount;
  const gain = f.gain;
  const todayGain = f.shares * (gsz - dwjz);
  const totalPct = amount > 0 ? (gain / amount * 100) : 0;
  return { ...f, gsz, dwjz, todayGain, totalPct };
}

function filterAndSortFunds() {
  let result = [...funds];

  // 搜索过滤
  if (searchKeyword) {
    const kw = searchKeyword.toLowerCase();
    result = result.filter(f => {
      const name = (f.name || '').toLowerCase();
      const code = (f.code || '').toLowerCase();
      return name.includes(kw) || code.includes(kw);
    });
  }

  // 排序
  result.sort((a, b) => {
    const da = getFundDisplayData(a);
    const db = getFundDisplayData(b);
    let va, vb;
    switch (currentSort.key) {
      case 'name': va = a.name; vb = b.name; break;
      case 'code': va = a.code; vb = b.code; break;
      case 'amount': va = da.amount; vb = db.amount; break;
      case 'gain': va = da.gain; vb = db.gain; break;
      case 'gsz': va = da.gsz; vb = db.gsz; break;
      case 'gszzl': va = da.gszzl || 0; vb = db.gszzl || 0; break;
      case 'cost': va = a.cost; vb = b.cost; break;
      case 'todayGain': va = da.todayGain; vb = db.todayGain; break;
      case 'totalPct': va = da.totalPct; vb = db.totalPct; break;
      default: va = da.amount; vb = db.amount;
    }
    if (typeof va === 'string') {
      return currentSort.asc ? va.localeCompare(vb) : vb.localeCompare(va);
    }
    return currentSort.asc ? va - vb : vb - va;
  });

  return result;
}

function renderTable() {
  const tbody = document.getElementById('fund-tbody');
  tbody.innerHTML = '';

  const sorted = filterAndSortFunds();

  for (const f of sorted) {
    const d = getFundDisplayData(f);
    const isSuspicious = Math.abs(d.totalPct) < 1 && d.amount > 5000;
    const isHighProfit = d.totalPct > 10;
    const isHighLoss = d.totalPct < -10;

    const row = document.createElement('tr');
    if (isSuspicious) row.classList.add('suspicious');
    if (isHighProfit) row.classList.add('high-profit');
    if (isHighLoss) row.classList.add('high-loss');

    row.innerHTML = `
      <td>${f.name || '—'}</td>
      <td>${f.code}</td>
      <td class="simple-hide">
        <input class="edit-input amt-edit" data-code="${f.code}" value="${d.amount.toFixed(2)}" type="number" step="0.01" title="持有金额">
      </td>
      <td class="simple-hide">
        <input class="edit-input gain-edit" data-code="${f.code}" value="${d.gain.toFixed(2)}" type="number" step="0.01" title="持有收益">
      </td>
      <td>${d.gsz > 0 ? d.gsz.toFixed(4) : '—'}</td>
      <td class="${d.gszzl >= 0 ? 'up' : 'down'}">${d.gsz > 0 ? (d.gszzl >= 0 ? '+' : '') + (d.gszzl || 0).toFixed(2) + '%' : '—'}</td>
      <td class="simple-hide">${d.cost.toFixed(4)}</td>
      <td class="${d.todayGain >= 0 ? 'up' : 'down'}">${d.gsz > 0 ? (d.todayGain >= 0 ? '+' : '') + d.todayGain.toFixed(2) : '—'}</td>
      <td class="${d.totalPct >= 0 ? 'up' : 'down'}">${d.totalPct >= 0 ? '+' : ''}${d.totalPct.toFixed(2)}%</td>
      <td>
        <button class="del-btn compare-add" data-code="${f.code}" title="添加到对比">+</button>
        <button class="del-btn" data-code="${f.code}" title="删除">×</button>
      </td>
    `;
    tbody.appendChild(row);
  }

  // 更新表头排序状态
  document.querySelectorAll('th[data-sort]').forEach(th => {
    th.classList.remove('sorted-asc', 'sorted-desc');
    if (th.dataset.sort === currentSort.key) {
      th.classList.add(currentSort.asc ? 'sorted-asc' : 'sorted-desc');
    }
  });
}

function renderOverview() {
  let totalAsset = 0, totalToday = 0, totalGain = 0;
  for (const f of funds) {
    const d = getFundDisplayData(f);
    totalAsset += d.amount;
    totalToday += d.todayGain;
    totalGain += d.gain;
  }
  document.getElementById('ov-asset').textContent = totalAsset > 0 ? totalAsset.toFixed(2) + '元' : '—';
  document.getElementById('ov-today').textContent = totalToday !== 0 ? (totalToday >= 0 ? '+' : '') + totalToday.toFixed(2) + '元' : '—';
  document.getElementById('ov-today').className = 'ov-value ' + (totalToday >= 0 ? 'up' : 'down');
  document.getElementById('ov-total').textContent = totalGain !== 0 ? (totalGain >= 0 ? '+' : '') + totalGain.toFixed(2) + '元' : '—';
  document.getElementById('ov-total').className = 'ov-value ' + (totalGain >= 0 ? 'up' : 'down');
  document.getElementById('ov-count').textContent = funds.length || '—';
}

function renderIndex() {
  for (const [code, info] of Object.entries(INDEX_MAP)) {
    const d = indexData[code];
    const el = document.getElementById(info.el);
    if (d) {
      const pct = typeof d.pct === 'string' ? parseFloat(d.pct) : d.pct;
      el.textContent = `${info.name}: ${d.price} (${pct >= 0 ? '+' : ''}${pct}%)`;
      el.className = 'idx-tag ' + (pct >= 0 ? 'up' : 'down');
    }
  }
}

function renderCompareBar() {
  const bar = document.getElementById('compare-bar');
  const container = document.getElementById('compare-funds');
  if (compareFunds.length === 0) {
    bar.classList.add('hidden');
    return;
  }
  bar.classList.remove('hidden');
  container.innerHTML = compareFunds.map(code => {
    const f = funds.find(x => x.code === code);
    const d = marketData[code] || {};
    const gszzl = d.gszzl || 0;
    return `<span class="compare-fund">${f?.name || code} ${gszzl >= 0 ? '+' : ''}${gszzl.toFixed(2)}%<span class="remove" data-code="${code}">×</span></span>`;
  }).join('');
}

function setStatus(msg, isError = false) {
  const el = document.getElementById('status-bar');
  el.textContent = msg;
  el.className = 'status-bar' + (isError ? ' error' : '');
}

async function refreshAll() {
  if (isRefreshing) return;
  isRefreshing = true;
  document.getElementById('btn-refresh').textContent = '刷新中…';
  setStatus('正在获取数据…');

  indexData = {};
  await fetchIndex();
  renderIndex();

  const promises = funds.map(async f => {
    const d = await fetchFundGJ(f.code);
    if (d) marketData[f.code] = d;
  });
  const results = await Promise.allSettled(promises);
  const failedCount = results.filter(r => r.status === 'rejected' || !r.value).length;

  renderTable();
  renderOverview();
  renderCompareBar();

  if (failedCount > 0 && failedCount === funds.length) {
    setStatus('数据获取失败，请检查网络', true);
  } else if (failedCount > 0) {
    setStatus(`部分数据获取失败 (${failedCount}/${funds.length})`, true);
  } else {
    setStatus(`更新于 ${new Date().toLocaleTimeString('zh-CN')}`);
  }

  document.getElementById('btn-refresh').textContent = '刷新数据';
  isRefreshing = false;
}

// Events
document.getElementById('btn-add').addEventListener('click', () => {
  document.getElementById('modal-add').classList.remove('hidden');
  document.getElementById('modal-code').focus();
});

document.getElementById('modal-cancel').addEventListener('click', () => {
  document.getElementById('modal-add').classList.add('hidden');
});

document.getElementById('modal-add').addEventListener('click', (e) => {
  if (e.target === document.getElementById('modal-add')) {
    document.getElementById('modal-add').classList.add('hidden');
  }
});

document.getElementById('modal-confirm').addEventListener('click', async () => {
  const codeRaw = document.getElementById('modal-code').value.trim();
  const amount = parseFloat(document.getElementById('modal-amount').value) || 0;
  const gain = parseFloat(document.getElementById('modal-gain').value) || 0;

  if (!codeRaw) { alert('请输入基金代码'); return; }
  if (!amount || amount <= 0) { alert('请输入持有金额'); return; }
  if (Math.abs(gain) >= amount) { alert('持有收益须小于持有金额'); return; }

  const code = codeRaw.replace(/[^0-9]/g, '');
  setStatus('正在获取基金信息…');
  const d = await fetchFundGJ(code);
  if (!d) { alert('找不到该基金，请检查代码是否正确'); setStatus(''); return; }

  if (funds.find(f => f.code === code)) {
    alert('该基金已在列表中'); setStatus(''); return;
  }

  // 存储：持有金额、持有收益、当前市值
  funds.push({ code, name: d.name, amount, gain, cost: d.gsz });
  marketData[code] = d;
  saveFunds();
  renderTable();
  renderOverview();
  document.getElementById('modal-add').classList.add('hidden');
  setStatus('添加成功：' + d.name);
});

document.getElementById('modal-code').addEventListener('input', async (e) => {
  const code = e.target.value.trim().replace(/[^0-9]/g, '');
  const preview = document.getElementById('modal-preview');
  if (code.length === 6) {
    preview.textContent = '正在获取基金信息…';
    const d = await fetchFundGJ(code);
    preview.textContent = d ? `基金名称：${d.name}` : '未找到该基金';
  } else {
    preview.textContent = '';
  }
});

document.getElementById('fund-tbody').addEventListener('blur', (e) => {
  if (!e.target.classList.contains('amt-edit') && !e.target.classList.contains('gain-edit')) return;
  const code = e.target.dataset.code;
  const f = funds.find(f => f.code === code);
  if (!f) return;

  const amtEl = e.target.classList.contains('amt-edit') ? e.target : e.target.closest('tr').querySelector('.amt-edit');
  const gainEl = e.target.classList.contains('gain-edit') ? e.target : e.target.closest('tr').querySelector('.gain-edit');
  const newAmt = parseFloat(amtEl.value) || 0;
  const newGain = parseFloat(gainEl.value) || 0;

  if (newAmt > 0) {
    f.amount = newAmt;
    f.gain = newGain;
    saveFunds();
    renderTable();
    renderOverview();
  }
}, true);

document.getElementById('fund-tbody').addEventListener('click', (e) => {
  if (e.target.classList.contains('del-btn') && !e.target.classList.contains('compare-add')) {
    const code = e.target.dataset.code;
    if (confirm(`删除 ${code}？`)) {
      funds = funds.filter(f => f.code !== code);
      delete marketData[code];
      compareFunds = compareFunds.filter(c => c !== code);
      saveFunds();
      renderTable();
      renderOverview();
      renderCompareBar();
    }
  } else if (e.target.classList.contains('compare-add')) {
    const code = e.target.dataset.code;
    if (!compareFunds.includes(code)) {
      if (compareFunds.length >= 4) {
        alert('最多对比4只基金');
        return;
      }
      compareFunds.push(code);
      renderCompareBar();
    }
  }
});

document.getElementById('compare-funds').addEventListener('click', (e) => {
  if (e.target.classList.contains('remove')) {
    const code = e.target.dataset.code;
    compareFunds = compareFunds.filter(c => c !== code);
    renderCompareBar();
  }
});

document.getElementById('btn-clear-compare').addEventListener('click', () => {
  compareFunds = [];
  renderCompareBar();
});

document.getElementById('btn-compare').addEventListener('click', () => {
  if (compareFunds.length < 2) {
    alert('请至少选择2只基金进行对比');
    return;
  }
  const result = document.getElementById('compare-result');
  let html = '<table style="width:100%;font-size:13px;border-collapse:collapse;"><thead><tr>';
  html += '<th style="text-align:left;padding:8px 4px;background:#0f3460;">基金</th>';
  html += '<th style="padding:8px 4px;background:#0f3460;">今日涨跌</th>';
  html += '<th style="padding:8px 4px;background:#0f3460;">持仓收益</th>';
  html += '<th style="padding:8px 4px;background:#0f3460;">累计收益%</th></tr></thead><tbody>';

  for (const code of compareFunds) {
    const f = funds.find(x => x.code === code);
    const d = getFundDisplayData(f);
    html += `<tr style="border-bottom:1px solid #1f2a40;">
      <td style="padding:8px 4px;">${f?.name || code}</td>
      <td style="padding:8px 4px;" class="${d.gszzl >= 0 ? 'up' : 'down'}">${d.gsz > 0 ? (d.gszzl >= 0 ? '+' : '') + (d.gszzl || 0).toFixed(2) + '%' : '—'}</td>
      <td style="padding:8px 4px;" class="${d.gain >= 0 ? 'up' : 'down'}">${d.gain >= 0 ? '+' : ''}${d.gain.toFixed(2)}</td>
      <td style="padding:8px 4px;" class="${d.totalPct >= 0 ? 'up' : 'down'}">${d.totalPct >= 0 ? '+' : ''}${d.totalPct.toFixed(2)}%</td>
    </tr>`;
  }
  html += '</tbody></table>';
  result.innerHTML = html;
  document.getElementById('modal-compare').classList.remove('hidden');
});

document.getElementById('modal-compare-close').addEventListener('click', () => {
  document.getElementById('modal-compare').classList.add('hidden');
});

document.getElementById('btn-clear').addEventListener('click', () => {
  if (confirm('确定清空所有基金数据？')) {
    funds = [];
    marketData = {};
    compareFunds = [];
    saveFunds();
    renderTable();
    renderOverview();
    renderCompareBar();
  }
});

document.getElementById('btn-refresh').addEventListener('click', refreshAll);

document.getElementById('sort-by').addEventListener('change', (e) => {
  const keyMap = { value: 'amount', today: 'todayGain', total: 'totalPct' };
  currentSort.key = keyMap[e.target.value] || 'amount';
  renderTable();
});

document.getElementById('search-input').addEventListener('input', (e) => {
  searchKeyword = e.target.value.trim();
  renderTable();
});

document.querySelectorAll('th[data-sort]').forEach(th => {
  th.addEventListener('click', () => {
    const key = th.dataset.sort;
    if (currentSort.key === key) {
      currentSort.asc = !currentSort.asc;
    } else {
      currentSort.key = key;
      currentSort.asc = false;
    }
    renderTable();
  });
});

document.getElementById('btn-simple').addEventListener('click', () => {
  currentView = 'simple';
  document.querySelectorAll('th, td').forEach(el => {
    if (el.classList.contains('simple-hide')) el.classList.add('simple-hide');
  });
  document.querySelectorAll('.view-toggle .btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-simple').classList.add('active');
  renderTable();
});

document.getElementById('btn-detail').addEventListener('click', () => {
  currentView = 'detail';
  document.querySelectorAll('th, td').forEach(el => el.classList.remove('simple-hide'));
  document.querySelectorAll('.view-toggle .btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-detail').classList.add('active');
  renderTable();
});

document.getElementById('btn-export').addEventListener('click', () => {
  if (funds.length === 0) {
    alert('没有数据可导出');
    return;
  }
  let csv = '﻿'; // BOM for UTF-8
  csv += '基金名称,代码,持有金额,持有收益,今日估值,今日涨跌%,持仓成本,今日收益,累计收益率%\n';
  for (const f of funds) {
    const d = getFundDisplayData(f);
    csv += `"${f.name}",${f.code},${d.amount.toFixed(2)},${d.gain.toFixed(2)},${d.gsz > 0 ? d.gsz.toFixed(4) : ''},${d.gsz > 0 ? (d.gszzl || 0).toFixed(2) + '%' : ''},${d.cost.toFixed(4)},${d.gsz > 0 ? d.todayGain.toFixed(2) : ''},${d.totalPct.toFixed(2)}%\n`;
  }
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `基金持仓_${new Date().toLocaleDateString('zh-CN').replace(/\//g, '-')}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  setStatus('已导出 CSV 文件');
});

document.getElementById('btn-import').addEventListener('click', async () => {
  if (funds.length > 0 && !confirm('将替换现有数据，是否继续？')) return;
  setStatus('正在获取基金数据…');
  try {
    const resp = await fetch('./funds_seed.json');
    const data = await resp.json();
    funds = data.map(f => ({ code: f.code, name: f.name, amount: f.shares * f.cost, gain: f.shares * (f.gsz - f.cost), cost: f.gsz }));
    marketData = {};
    for (const f of data) {
      marketData[f.code] = { name: f.name, gsz: f.gsz, gszzl: f.gszzl, dwjz: f.dwjz };
    }
    saveFunds();
    renderTable();
    renderOverview();
    refreshAll();
    setStatus('已导入' + funds.length + '只基金');
  } catch(e) {
    alert('导入失败: ' + e.message);
    setStatus('导入失败', true);
  }
});

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT') return;
  const focused = document.querySelector('tr:hover');
  if (e.key === 'j' || e.key === 'ArrowDown') {
    // 移动选择
  } else if (e.key === 'k' || e.key === 'ArrowUp') {
    // 移动选择
  } else if (e.key === 'r') {
    refreshAll();
  }
});

// Init
loadFunds();
if (funds.length === 0) {
  fetch('./funds_seed.json')
    .then(r => r.json())
    .then(data => {
      funds = data.map(f => ({ code: f.code, name: f.name, amount: f.shares * f.cost, gain: f.shares * (f.gsz - f.cost), cost: f.gsz }));
      marketData = {};
      for (const f of data) {
        marketData[f.code] = { name: f.name, gsz: f.gsz, gszzl: f.gszzl, dwjz: f.dwjz };
      }
      saveFunds();
      renderTable();
      renderOverview();
      setStatus('已自动导入' + funds.length + '只基金（数据基于昨日净值）');
    })
    .catch(() => {
      renderTable();
      renderOverview();
      setStatus('读取数据中…');
    });
} else {
  renderTable();
  renderOverview();
}

refreshAll();
setInterval(refreshAll, 30000);
</script>
